# Render.com deployment configuration
# This file enables automatic deployments from your GitHub repository

services:
  # Web service for the Yahoo Mail MCP Server
  - type: web
    name: yahoo-mail-mcp-server
    runtime: docker
    plan: free  # Starter is better if you want to avoid sleep/wake delays
    region: oregon  # Choose: oregon, frankfurt, singapore, ohio

    # Build configuration
    dockerfilePath: ./Dockerfile
    dockerContext: .

    # Environment variables (set sensitive values in Render Dashboard)
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRANSPORT_MODE
        value: sse
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PORT
        fromService:
          type: web
          name: yahoo-mail-mcp-server
          property: port
      - key: YAHOO_CLIENT_ID
        sync: false
      - key: YAHOO_CLIENT_SECRET
        sync: false
      - key: YAHOO_SCOPES
        value: openid email mail-r mail-w

    # Health check configuration
    healthCheckPath: /health

    # Auto-deploy settings
    autoDeploy: true

    # Scaling (for paid plans)
    numInstances: 1

    # Resource limits (for paid plans)
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
