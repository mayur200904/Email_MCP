# Fly.io configuration for Yahoo Mail MCP Server
# Docs: https://fly.io/docs/reference/configuration/

app = 'email-mcp-connector'
primary_region = 'bom'  # Mumbai, India (closest to your team)

[build]
  dockerfile = 'Dockerfile'

[env]
  TRANSPORT_MODE = 'sse'
  NODE_ENV = 'production'
  YAHOO_SCOPES = 'openid email'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = 'http'
    port = 3000
    path = '/health'
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
